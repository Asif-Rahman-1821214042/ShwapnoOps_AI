services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/app/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/shwapno_ops.db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Production scale-out path (disabled by default in this demo).
  # Uncomment to run analytics scans as distributed Celery workers instead
  # of the built-in in-process scheduler.
  #
  # worker:
  #   build: ./backend
  #   command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=8
  #   depends_on:
  #     - redis
  #   volumes:
  #     - ./backend:/app
  #
  # beat:
  #   build: ./backend
  #   command: celery -A app.workers.celery_app beat --loglevel=info
  #   depends_on:
  #     - redis
  #   volumes:
  #     - ./backend:/app

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - api
