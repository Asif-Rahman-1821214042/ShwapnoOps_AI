<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>POS Summary | ShwapnoOps AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f9f3;--panel:#fff;--ink:#101828;--muted:#667085;--line:#d9e1dc;--blue:#175cd3;--green:#067647;--red:#b42318;--amber:#b54708}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif}header{padding:17px 28px;border-bottom:1px solid var(--line);background:#fff;display:flex;gap:16px;align-items:center;justify-content:space-between}.brand{display:flex;gap:10px;align-items:center}.mark{height:32px;width:32px;border-radius:7px;background:linear-gradient(135deg,#e31b23 0 47%,#f9b233 47% 70%,#15803d 70%)}h1{font-size:18px;margin:0}small{color:var(--muted)}a{color:var(--blue);text-decoration:none}.nav{font:600 11px 'IBM Plex Mono';text-transform:uppercase}main{max-width:1560px;margin:auto;padding:22px 28px 50px}.filters,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px}.filters{padding:15px;display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px;margin-bottom:18px}label{font:600 10px 'IBM Plex Mono';color:var(--muted);text-transform:uppercase;display:grid;gap:5px}select,input,button{font:inherit;border:1px solid var(--line);border-radius:6px;padding:8px;background:#fff;color:var(--ink)}button{cursor:pointer;background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}.metric{min-height:180px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:15px;box-shadow:0 3px 10px rgba(16,24,40,.04)}.metric span{display:block;color:var(--muted);font:600 10px 'IBM Plex Mono';text-transform:uppercase}.metric strong{display:block;font-size:22px;margin-top:7px}.metric small{display:block;margin-top:6px}.good{color:var(--green)}.bad-text{color:var(--red)}.warn-text{color:var(--amber)}.progress{height:7px;background:#eef2ef;border-radius:99px;overflow:hidden;margin:12px 0 4px}.progress i{display:block;height:100%;background:var(--green)}.progress.low i{background:var(--amber)}.payment-lines{display:grid;gap:4px;margin-top:8px;font-size:12px}.payment-lines div{display:flex;justify-content:space-between;gap:8px}.panel{padding:17px;margin-bottom:18px}.panel-head{display:flex;justify-content:space-between;gap:12px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:12px}.panel-head h2{font-size:16px;margin:0}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:12px}th{font:600 10px 'IBM Plex Mono';color:var(--muted);text-transform:uppercase;text-align:left;white-space:nowrap}td,th{padding:10px 8px;border-bottom:1px solid #eef1ee;vertical-align:top}.pill{display:inline-block;padding:3px 7px;border-radius:999px;background:#eef4ff;color:#175cd3;font:600 10px 'IBM Plex Mono';text-transform:uppercase}.pill.bad{background:#fef3f2;color:var(--red)}.pill.warn{background:#fffaeb;color:var(--amber)}.payment-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.payment{border:1px solid var(--line);border-radius:7px;padding:12px}.payment b{display:block;margin-bottom:5px}.payment small{display:block}.toolbar{display:flex;gap:8px;align-items:end;flex-wrap:wrap}.toolbar label{min-width:150px}.pager{display:flex;justify-content:flex-end;gap:8px;align-items:center;padding-top:13px;font:12px 'IBM Plex Mono'}.pager button:disabled{opacity:.45;cursor:not-allowed}.modal{position:fixed;inset:0;background:rgba(16,24,40,.45);display:none;align-items:center;justify-content:center;padding:20px}.modal.show{display:flex}.dialog{width:min(760px,100%);max-height:85vh;overflow:auto;background:#fff;border-radius:8px;padding:20px}.dialog pre{white-space:pre-wrap;font:12px 'IBM Plex Mono';background:#f9fafb;padding:12px;border-radius:6px}@media(max-width:1050px){.filters{grid-template-columns:repeat(3,1fr)}.summary{grid-template-columns:repeat(2,1fr)}.payment-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:650px){header,main{padding-left:14px;padding-right:14px}.filters,.summary,.payment-grid{grid-template-columns:1fr}.filters{gap:9px}}
</style><style>body.embed main{max-width:none;padding:18px}.embed header{display:none}.embed .filters{margin-top:0}</style></head><body>
<header><div class="brand"><div class="mark"></div><div><h1>POS Summary</h1><small>Outlet sales, payment collection, and mobile financial service orders</small></div></div><div class="nav"><a href="/">Operations Dashboard</a> &nbsp; <a href="/data-tables.html?view=pos">Data Tables</a></div></header>
<main>
<section class="filters"><label>Period<select id="period"><option value="today">Today</option><option value="yesterday">Yesterday</option><option value="week">This week</option><option value="month">This month</option><option value="custom">Custom range</option></select></label><label>Start date<input id="startDate" type="date"></label><label>End date<input id="endDate" type="date"></label><label>Outlet<select id="outlet"></select></label><label>POS terminal<select id="terminal"></select></label><label>Cashier<select id="cashier"></select></label><button id="apply">Apply filters</button></section>
<section class="summary" id="kpis"></section>
<section class="panel"><div class="panel-head"><h2>Payment Method Summary</h2><small id="summaryRange"></small></div><div class="payment-grid" id="payments"></div></section>
<section class="panel"><div class="panel-head"><h2>Digital Payment Orders</h2><a id="csv" href="#">Export CSV</a></div><div class="toolbar"><label>Payment method<select id="mfsMethod"></select></label><label>Payment status<select id="paymentStatus"><option value="">All statuses</option><option value="paid">Paid</option><option value="partial">Partial</option><option value="unpaid">Unpaid</option><option value="refunded">Refunded</option></select></label><label>Order status<select id="orderStatus"><option value="">All statuses</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option><option value="refunded">Refunded</option></select></label><label>Search<input id="search" placeholder="Invoice, phone, transaction ID"></label><label>Sort<select id="sort"><option value="transaction_at:desc">Newest first</option><option value="transaction_at:asc">Oldest first</option><option value="amount:desc">Highest amount</option><option value="amount:asc">Lowest amount</option></select></label><button id="searchBtn">Search</button></div><div class="table-wrap"><table><thead><tr><th>Invoice</th><th>Date/time</th><th>Customer</th><th>Outlet</th><th>Cashier</th><th>Method</th><th>Transaction ID</th><th>Order</th><th>Discount</th><th>Paid</th><th>Payment</th><th>Order</th><th></th></tr></thead><tbody id="orders"></tbody></table></div><div class="pager"><button id="prev">Previous</button><span id="pageInfo"></span><button id="next">Next</button></div></section>
</main><div class="modal" id="modal"><section class="dialog"><div class="panel-head"><h2>Complete Order Details</h2><button id="close">Close</button></div><pre id="detail"></pre></section></div>
<script>
const $=id=>document.getElementById(id), money=n=>`BDT ${Number(n||0).toLocaleString('en-BD',{maximumFractionDigits:2})}`, esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const pageParams=new URLSearchParams(location.search), requestedOutlet=pageParams.get('outlet_id');if(pageParams.get('embed')==='1')document.body.classList.add('embed');let page=1,last={total:0,page_size:20};
async function api(path){const r=await fetch(path);if(!r.ok)throw new Error(await r.text());return r.json()}function params(includeOrder=true){const p=new URLSearchParams({period:$('period').value});for(const [key,id] of [['start_date','startDate'],['end_date','endDate'],['outlet_id','outlet'],['terminal_id','terminal'],['cashier_employee_id','cashier']])if($(id).value)p.set(key,$(id).value);if(includeOrder){for(const [key,id] of [['payment_method_id','mfsMethod'],['payment_status','paymentStatus'],['order_status','orderStatus'],['search','search']])if($(id).value)p.set(key,$(id).value)}return p}
async function choices(){const outlets=await api('/api/outlets');$('outlet').innerHTML=outlets.map(x=>`<option value="${x.id}" ${String(x.id)===requestedOutlet?'selected':''}>${esc(x.name)}</option>`).join('');await dependentChoices();const methods=await api('/api/pos/payment-methods');$('mfsMethod').innerHTML='<option value="">All digital methods</option>'+methods.filter(x=>x.is_digital).map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('')}
async function dependentChoices(){const suffix=$('outlet').value?`?outlet_id=${$('outlet').value}`:'';const [terminals,cashiers]=await Promise.all([api('/api/pos/terminals'+suffix),api('/api/pos/cashiers'+suffix)]);$('terminal').innerHTML='<option value="">All terminals</option>'+terminals.map(x=>`<option value="${x.id}">${esc(x.name)} (${esc(x.code)})</option>`).join('');$('cashier').innerHTML='<option value="">All cashiers</option>'+cashiers.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('')}
function pill(v){return `<span class="pill ${['cancelled','refunded','unpaid'].includes(v)?'bad':v==='partial'?'warn':''}">${esc(v)}</span>`}async function loadKpis(){const data=await api('/api/pos/kpis?'+params(false));const sales=data.sales,orders=data.orders,basket=data.basket,attendance=data.attendance,availability=data.availability,pay=data.payment_completion,digital=data.digital_cash,score=data.productivity;const achievement=sales.achievement_pct??0,positive=achievement>=100;$('kpis').innerHTML=`<article class="metric"><span>Today's Sales & Target</span><strong>${money(sales.amount)}</strong><small>Target: ${money(sales.target)}</small><div class="progress ${positive?'':'low'}"><i style="width:${Math.min(achievement,100)}%"></i></div><small class="${positive?'good':'warn-text'}">${Math.abs(sales.variance)>=0?money(Math.abs(sales.variance)):'—'} ${positive?'above':'below'} target · ${achievement}%</small></article><article class="metric"><span>E-Cash Summary</span><strong>${money(digital.amount)}</strong><small>${digital.sales_pct}% of total sales</small><div class="payment-lines">${digital.breakdown.map(x=>`<div><span>${esc(x.name)}</span><b>${money(x.amount)}</b></div>`).join('')||'<small>No digital payments recorded.</small>'}</div></article><article class="metric"><span>Total Orders</span><strong>${orders.completed}</strong><small>Pending ${orders.pending} · Cancelled ${orders.cancelled}</small><small>Refunded ${orders.refunded}${orders.target?` · Target ${orders.target}`:' · No order target set'}</small></article><article class="metric"><span>Basket Size (Average)</span><strong>${money(basket.average_value)}</strong><small>${basket.average_items} items avg</small><small>${basket.target?`Target avg: ${money(basket.target)}`:'No basket target set'}</small></article><article class="metric"><span>Payment Completion Rate</span><strong class="${pay.rate>=90?'good':'warn-text'}">${pay.rate}%</strong><small>${pay.paid_orders} paid · ${pay.pending_or_failed} pending or failed</small><small>${pay.rate>=90?'Healthy (90%+)':'Needs attention'}</small></article><article class="metric"><span>Stock Availability</span><strong class="${availability.pct>=90?'good':'warn-text'}">${availability.pct}%</strong><small>${availability.available_products} available · ${availability.out_of_stock} out of stock</small><small class="${availability.low_stock?'warn-text':'good'}">${availability.low_stock} low-stock warning(s)</small></article><article class="metric"><span>Employee Attendance</span><strong>${attendance.present} / ${attendance.scheduled}</strong><small>${attendance.absent} absent · ${attendance.leave} on leave</small><small>${attendance.day_off} day off · ${attendance.pct}% present</small></article><article class="metric"><span>POS Productivity Score</span><strong class="${score.score>=90?'good':'warn-text'}">${score.score}%</strong><small>Sales, orders, basket, attendance, payments, stock</small><small>${score.district_comparison_pct===null?'District comparison unavailable':'vs district average '+score.district_comparison_pct+'%'}</small></article>`}async function loadSummary(){const data=await api('/api/pos/summary?'+params(false));$('summaryRange').textContent=`${data.range.start} to ${data.range.end}`;$('payments').innerHTML=data.payment_methods.map(x=>`<div class="payment"><b>${esc(x.name)}</b><small>${x.orders} orders</small><strong>${money(x.received_amount)}</strong><small>${x.sales_pct}% of total sales</small></div>`).join('')}
async function loadOrders(){const p=params();p.set('page',page);p.set('page_size','20');const [sort_by,sort_dir]=$('sort').value.split(':');p.set('sort_by',sort_by);p.set('sort_dir',sort_dir);const data=await api('/api/pos/mobile-orders?'+p);last=data;$('orders').innerHTML=data.items.map(o=>{const pay=o.payments[0]||{};return `<tr><td>${esc(o.invoice_no)}</td><td>${new Date(o.transaction_at).toLocaleString('en-GB')}</td><td>${esc(o.customer_name)}<br><small>${esc(o.customer_phone||'')}</small></td><td>${esc(o.outlet_name)}</td><td>${esc(o.cashier_name)}</td><td>${esc(pay.payment_method||'')}</td><td>${esc(pay.transaction_id||'')}</td><td>${money(o.order_amount)}</td><td>${money(o.discount_amount)}</td><td>${money(o.paid_amount)}</td><td>${pill(o.payment_status)}</td><td>${pill(o.order_status)}</td><td><button data-id="${o.id}" class="detail">View</button></td></tr>`}).join('')||'<tr><td colspan="13">No mobile financial service orders match these filters.</td></tr>';$('pageInfo').textContent=`Page ${data.page} of ${Math.max(1,Math.ceil(data.total/data.page_size))} (${data.total} orders)`;$('prev').disabled=page===1;$('next').disabled=page*data.page_size>=data.total;$('csv').href='/api/pos/mobile-orders/export.csv?'+params();document.querySelectorAll('.detail').forEach(b=>b.onclick=async()=>{const o=await api('/api/pos/orders/'+b.dataset.id);$('detail').textContent=JSON.stringify(o,null,2);$('modal').classList.add('show')})}
async function refresh(){await Promise.all([loadKpis(),loadSummary(),loadOrders()])}$('outlet').onchange=async()=>{await dependentChoices();page=1;refresh()};$('apply').onclick=()=>{page=1;refresh()};$('searchBtn').onclick=()=>{page=1;loadOrders()};$('prev').onclick=()=>{page--;loadOrders()};$('next').onclick=()=>{page++;loadOrders()};$('close').onclick=()=>$('modal').classList.remove('show');choices().then(refresh).catch(e=>{$('orders').innerHTML=`<tr><td colspan="13">${esc(e.message)}</td></tr>`});
</script><script>
window.addEventListener('load', async () => {
  const methods = await api('/api/pos/payment-methods');
  $('mfsMethod').innerHTML = '<option value="">All e-payment methods</option>' + methods
    .filter(method => method.transaction_category === 'e_payment')
    .map(method => `<option value="${method.id}">${esc(method.name)}</option>`).join('');
  [...document.querySelectorAll('h2')].forEach(heading => {
    if (heading.textContent === 'Digital Payment Orders') heading.textContent = 'E-Payment Orders';
  });
});
</script></body></html>
