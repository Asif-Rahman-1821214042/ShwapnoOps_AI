<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ShwapnoOps Chatbot</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"><style>
:root{--bg:#f7f9f3;--panel:#fff;--ink:#101828;--muted:#667085;--line:#d9e1dc;--blue:#175cd3;--green:#067647}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif}header{height:68px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:16px}.brand{display:flex;align-items:center;gap:10px}.mark{height:32px;width:32px;border-radius:7px;background:linear-gradient(135deg,#e31b23 0 47%,#f9b233 47% 70%,#15803d 70%)}h1{font-size:18px;margin:0}small{color:var(--muted)}a{color:var(--blue);text-decoration:none;font:600 11px 'IBM Plex Mono';text-transform:uppercase}main{max-width:980px;margin:auto;padding:26px 20px}.shell{height:calc(100vh - 120px);min-height:560px;background:#fff;border:1px solid var(--line);border-radius:8px;display:flex;flex-direction:column;overflow:hidden}.toolbar{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}.toolbar h2{font-size:16px;margin:0}.toolbar select{min-width:230px}.suggestions{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap}.suggestion{background:#fff;border:1px solid var(--line);border-radius:6px;padding:7px 9px;cursor:pointer;color:#344054;font:600 11px 'IBM Plex Mono'}.suggestion:hover{border-color:var(--blue);color:var(--blue)}.log{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:12px}.msg{max-width:80%;padding:10px 12px;border-radius:8px;line-height:1.45;font-size:14px;white-space:pre-wrap}.bot{align-self:flex-start;background:#f2f4f7}.loading{color:var(--muted);font-style:italic}.loading-dots::after{content:'...';display:inline-block;width:18px;overflow:hidden;vertical-align:bottom;animation:typing 1s steps(4,end) infinite}@keyframes typing{from{width:0}to{width:18px}}.user{align-self:flex-end;background:#175cd3;color:#fff}.composer{padding:14px 16px;border-top:1px solid var(--line);display:flex;gap:9px}.composer input{flex:1;border:1px solid var(--line);border-radius:6px;padding:11px 12px;font:14px 'IBM Plex Sans'}.composer button{background:#175cd3;color:#fff;border:0;border-radius:6px;padding:0 18px;font-weight:600;cursor:pointer}@media(max-width:650px){header{padding:0 14px}main{padding:14px}.shell{height:calc(100vh - 96px)}.toolbar{align-items:flex-start;flex-direction:column}.toolbar select{width:100%}.msg{max-width:92%}}
</style></head><body><header><div class="brand"><div class="mark"></div><div><h1>ShwapnoOps Chatbot</h1><small>Grounded outlet operations assistant</small></div></div><a href="/">Operations Dashboard</a></header><main><section class="shell"><div class="toolbar"><div><h2>Ask about your outlet</h2><small id="outletLabel">Loading outlets...</small></div><select id="outlet"></select></div><div class="suggestions" id="suggestions"></div><div class="log" id="log"></div><div class="composer"><input id="input" placeholder="Ask about tasks, stock, attendance, peak coverage, or complaints"><button id="send">Send</button></div></section></main><script>
const $=id=>document.getElementById(id),qs=['What should I prioritize today?','Which SKUs are at stock risk?','Who is absent or late in attendance today?','Predict peak hour and organize manpower today','How are card POS payments today?','Show bKash and e-payment performance today'];let outletId=null,isSending=false;function msg(text,who){const el=document.createElement('div');el.className='msg '+who;el.textContent=text;$('log').append(el);$('log').scrollTop=$('log').scrollHeight;return el}async function api(path,options){const r=await fetch(path,options);if(!r.ok)throw new Error('Request failed');return r.json()}async function send(text){if(!text.trim()||!outletId||isSending)return;isSending=true;msg(text,'user');$('input').value='';$('input').disabled=true;$('send').disabled=true;const loading=msg('Analyzing outlet data','bot loading');const dots=document.createElement('span');dots.className='loading-dots';loading.append(dots);try{const data=await api('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({outlet_id:outletId,message:text})});loading.remove();msg(data.reply,'bot')}catch{loading.remove();msg("Couldn't reach the assistant. Please try again.",'bot')}finally{isSending=false;$('input').disabled=false;$('send').disabled=false;$('input').focus()}}async function boot(){const outlets=await api('/api/outlets');$('outlet').innerHTML=outlets.map(o=>`<option value="${o.id}">${o.name}</option>`).join('');outletId=Number($('outlet').value);$('outletLabel').textContent=$('outlet').selectedOptions[0].textContent;$('outlet').onchange=()=>{outletId=Number($('outlet').value);$('outletLabel').textContent=$('outlet').selectedOptions[0].textContent;$('log').innerHTML='';msg('Outlet changed. What would you like to know?','bot')};$('suggestions').innerHTML=qs.map(q=>`<button class="suggestion">${q}</button>`).join('');document.querySelectorAll('.suggestion').forEach((b,i)=>b.onclick=()=>send(qs[i]));msg("Hi, I'm your ShwapnoOps assistant. I use the selected outlet's live data to answer operational questions.",'bot')}$('send').onclick=()=>send($('input').value);$('input').onkeydown=e=>{if(e.key==='Enter')send(e.target.value)};boot().catch(()=>msg('Could not load outlets. Check the API connection.','bot'));
</script></body></html>
